<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>User Management</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">

        <h2>User Management</h2>

        <a th:href="@{/dashboard}"
           class="btn btn-secondary">
            Back
        </a>

    </div>

    <table class="table table-striped table-hover align-middle">

        <thead class="table-dark">
        <tr>
            <th>Username</th>
            <th>Role</th>
            <th>Balance</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="user : ${users}">

            <td th:text="${user.username}"></td>

            <td>
                <span th:text="${user.role}"></span>
            </td>

            <td th:text="${user.balance}"></td>

            <td>

                <span th:if="${user.active}"
                      class="badge bg-success">
                    Active
                </span>

                <span th:unless="${user.active}"
                      class="badge bg-danger">
                    Blocked
                </span>

            </td>

            <td>

                <!-- Block -->

                <form th:if="${user.active}"
                      th:action="@{/admin/users/{id}/block(id=${user.id})}"
                      method="post"
                      class="d-inline">

                    <button class="btn btn-danger btn-sm">
                        Block
                    </button>

                </form>

                <!-- Unblock -->

                <form th:unless="${user.active}"
                      th:action="@{/admin/users/{id}/unblock(id=${user.id})}"
                      method="post"
                      class="d-inline">

                    <button class="btn btn-success btn-sm">
                        Unblock
                    </button>

                </form>

                <!-- Make Manager -->

                <form th:if="${user.role == 'USER'}"
                      th:action="@{/admin/users/{id}/manager(id=${user.id})}"
                      method="post"
                      class="d-inline">

                    <button class="btn btn-warning btn-sm">
                        Make Manager
                    </button>

                </form>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
