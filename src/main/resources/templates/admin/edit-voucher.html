<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title th:text="#{voucher.edit.title}">Edit Voucher</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning d-flex justify-content-between align-items-center">
                    <h3 class="mb-0" th:text="#{voucher.edit.title}">
                        Edit Voucher
                    </h3>

                    <div>
                        <a th:href="@{/admin/vouchers/{id}/edit(id=${voucher.id}, lang='en')}"
                           class="btn btn-sm btn-outline-dark">
                            EN
                        </a>

                        <a th:href="@{/admin/vouchers/{id}/edit(id=${voucher.id}, lang='uk')}"
                           class="btn btn-sm btn-outline-dark">
                            UA
                        </a>
                    </div>
                </div>

                <div class="card-body">

                    <form th:action="@{/admin/vouchers/{id}/edit(id=${voucher.id})}"
                          th:object="${voucher}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label"
                                   th:text="#{voucher.title.label}">
                                Title
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{title}">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('title')}"
                                 th:errors="*{title}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"
                                   th:text="#{voucher.description.label}">
                                Description
                            </label>

                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{description}">
                            </textarea>

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('description')}"
                                 th:errors="*{description}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label"
                                   th:text="#{voucher.price.label}">
                                Price
                            </label>

                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{price}">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('price')}"
                                 th:errors="*{price}">
                            </div>
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       th:text="#{voucher.tourType.label}">
                                    Tour Type
                                </label>

                                <select class="form-select"
                                        th:field="*{tourType}">
                                    <option value="">---</option>
                                    <option value="HEALTH">HEALTH</option>
                                    <option value="SPORTS">SPORTS</option>
                                    <option value="LEISURE">LEISURE</option>
                                    <option value="SAFARI">SAFARI</option>
                                    <option value="WINE">WINE</option>
                                    <option value="ECO">ECO</option>
                                    <option value="ADVENTURE">ADVENTURE</option>
                                    <option value="CULTURAL">CULTURAL</option>
                                </select>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('tourType')}"
                                     th:errors="*{tourType}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       th:text="#{voucher.transferType.label}">
                                    Transfer Type
                                </label>

                                <select class="form-select"
                                        th:field="*{transferType}">
                                    <option value="">---</option>
                                    <option value="BUS">BUS</option>
                                    <option value="TRAIN">TRAIN</option>
                                    <option value="PLANE">PLANE</option>
                                    <option value="SHIP">SHIP</option>
                                    <option value="PRIVATE_CAR">PRIVATE_CAR</option>
                                    <option value="JEEPS">JEEPS</option>
                                    <option value="MINIBUS">MINIBUS</option>
                                    <option value="ELECTRICAL_CARS">ELECTRICAL_CARS</option>
                                </select>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('transferType')}"
                                     th:errors="*{transferType}">
                                </div>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       th:text="#{voucher.hotelType.label}">
                                    Hotel Type
                                </label>

                                <select class="form-select"
                                        th:field="*{hotelType}">
                                    <option value="">---</option>
                                    <option value="ONE_STAR">ONE_STAR</option>
                                    <option value="TWO_STARS">TWO_STARS</option>
                                    <option value="THREE_STARS">THREE_STARS</option>
                                    <option value="FOUR_STARS">FOUR_STARS</option>
                                    <option value="FIVE_STARS">FIVE_STARS</option>
                                </select>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('hotelType')}"
                                     th:errors="*{hotelType}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       th:text="#{voucher.status.label}">
                                    Status
                                </label>

                                <select class="form-select"
                                        th:field="*{status}">
                                    <option value="">---</option>
                                    <option value="REGISTERED">REGISTERED</option>
                                    <option value="PAID">PAID</option>
                                    <option value="CANCELED">CANCELED</option>
                                </select>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('status')}"
                                     th:errors="*{status}">
                                </div>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       th:text="#{voucher.arrivalDate.label}">
                                    Arrival Date
                                </label>

                                <input type="date"
                                       class="form-control"
                                       th:field="*{arrivalDate}">

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('arrivalDate')}"
                                     th:errors="*{arrivalDate}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       th:text="#{voucher.evictionDate.label}">
                                    Eviction Date
                                </label>

                                <input type="date"
                                       class="form-control"
                                       th:field="*{evictionDate}">

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('evictionDate')}"
                                     th:errors="*{evictionDate}">
                                </div>
                            </div>

                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{isHot}">

                            <label class="form-check-label"
                                   th:text="#{voucher.hot.label}">
                                Hot Voucher
                            </label>

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('isHot')}"
                                 th:errors="*{isHot}">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/dashboard}"
                               class="btn btn-secondary"
                               th:text="#{button.back}">
                                Back
                            </a>

                            <button type="submit"
                                    class="btn btn-warning"
                                    th:text="#{button.update}">
                                Update
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
