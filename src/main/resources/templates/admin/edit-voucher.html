<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <title>Edit Voucher</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-warning">
                    <h3 class="mb-0">Edit Voucher</h3>
                </div>

                <div class="card-body">

                    <form th:action="@{/admin/vouchers/{id}/edit(id=${voucher.id})}"
                          th:object="${voucher}"
                          method="post">

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{title}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea class="form-control"
                                      rows="3"
                                      th:field="*{description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   th:field="*{price}">
                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Tour Type</label>
                                <select class="form-select" th:field="*{tourType}">
                                    <option value="HEALTH">HEALTH</option>
                                    <option value="SPORTS">SPORTS</option>
                                    <option value="LEISURE">LEISURE</option>
                                    <option value="SAFARI">SAFARI</option>
                                    <option value="WINE">WINE</option>
                                    <option value="ECO">ECO</option>
                                    <option value="ADVENTURE">ADVENTURE</option>
                                    <option value="CULTURAL">CULTURAL</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Transfer Type</label>
                                <select class="form-select" th:field="*{transferType}">
                                    <option value="BUS">BUS</option>
                                    <option value="TRAIN">TRAIN</option>
                                    <option value="PLANE">PLANE</option>
                                    <option value="SHIP">SHIP</option>
                                    <option value="PRIVATE_CAR">PRIVATE_CAR</option>
                                    <option value="JEEPS">JEEPS</option>
                                    <option value="MINIBUS">MINIBUS</option>
                                    <option value="ELECTRICAL_CARS">ELECTRICAL_CARS</option>
                                </select>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hotel Type</label>
                                <select class="form-select" th:field="*{hotelType}">
                                    <option value="ONE_STAR">ONE_STAR</option>
                                    <option value="TWO_STARS">TWO_STARS</option>
                                    <option value="THREE_STARS">THREE_STARS</option>
                                    <option value="FOUR_STARS">FOUR_STARS</option>
                                    <option value="FIVE_STARS">FIVE_STARS</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="REGISTERED">REGISTERED</option>
                                    <option value="PAID">PAID</option>
                                    <option value="CANCELED">CANCELED</option>
                                </select>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Arrival Date</label>
                                <input type="date"
                                       class="form-control"
                                       th:field="*{arrivalDate}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Eviction Date</label>
                                <input type="date"
                                       class="form-control"
                                       th:field="*{evictionDate}">
                            </div>

                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input"
                                   type="checkbox"
                                   th:field="*{isHot}">

                            <label class="form-check-label">
                                Hot Voucher
                            </label>
                        </div>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/dashboard}"
                               class="btn btn-secondary">
                                Back
                            </a>

                            <button type="submit"
                                    class="btn btn-warning">
                                Update Voucher
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
