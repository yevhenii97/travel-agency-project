<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">

    <title th:text="#{nav.myVouchers}">
        My Vouchers
    </title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">

            <h3 class="mb-0"
                th:text="#{nav.myVouchers}">
                My Vouchers
            </h3>

            <div>
                <a th:href="@{/vouchers/my(lang='en')}"
                   class="btn btn-sm btn-outline-light">
                    EN
                </a>

                <a th:href="@{/vouchers/my(lang='uk')}"
                   class="btn btn-sm btn-outline-light">
                    UA
                </a>

                <a th:href="@{/dashboard}"
                   class="btn btn-sm btn-light"
                   th:text="#{button.back}">
                    Back
                </a>
            </div>

        </div>

        <div class="card-body">

            <div th:if="${param.success}"
                 class="alert alert-success"
                 th:text="#{voucher.order.success}">
                Voucher ordered successfully!
            </div>

            <table class="table table-striped table-hover align-middle">

                <thead class="table-dark">
                <tr>
                    <th th:text="#{table.title}">Title</th>
                    <th th:text="#{table.description}">Description</th>
                    <th th:text="#{table.price}">Price</th>
                    <th th:text="#{table.status}">Status</th>
                    <th th:text="#{voucher.arrivalDate.label}">Arrival</th>
                    <th th:text="#{voucher.evictionDate.label}">Eviction</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="voucher : ${vouchers}">
                    <td th:text="${voucher.title}"></td>
                    <td th:text="${voucher.description}"></td>
                    <td th:text="${voucher.price}"></td>
                    <td th:text="${voucher.status}"></td>
                    <td th:text="${voucher.arrivalDate}"></td>
                    <td th:text="${voucher.evictionDate}"></td>
                </tr>

                <tr th:if="${#lists.isEmpty(vouchers)}">
                    <td colspan="6"
                        class="text-center text-muted"
                        th:text="#{message.noVouchers}">
                        No vouchers available
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
