<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>My Vouchers</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>My Vouchers</h1>

        <a th:href="@{/dashboard}"
           class="btn btn-outline-primary">
            Back to Catalog
        </a>
    </div>

    <div th:if="${param.success}"
         class="alert alert-success">
        Voucher ordered successfully!
    </div>

    <table class="table table-striped table-hover">

        <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Description</th>
            <th>Price</th>
            <th>Status</th>
            <th>Arrival</th>
            <th>Eviction</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="voucher : ${vouchers}">
            <td th:text="${voucher.title}"></td>
            <td th:text="${voucher.description}"></td>
            <td th:text="${voucher.price}"></td>
            <td th:text="${voucher.status}"></td>
            <td th:text="${voucher.arrivalDate}"></td>
            <td th:text="${voucher.evictionDate}"></td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
