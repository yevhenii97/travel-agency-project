<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">

    <title th:text="#{password.title}">
        Change Password
    </title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-info text-white d-flex justify-content-between align-items-center">

                    <h3 class="mb-0"
                        th:text="#{password.title}">
                        Change Password
                    </h3>

                    <div>
                        <a th:href="@{/users/me/password(lang='en')}"
                           class="btn btn-sm btn-outline-light">
                            EN
                        </a>

                        <a th:href="@{/users/me/password(lang='uk')}"
                           class="btn btn-sm btn-outline-light">
                            UA
                        </a>
                    </div>

                </div>

                <div class="card-body">

                    <form th:action="@{/users/me/password}"
                          th:object="${changePasswordRequest}"
                          method="post">

                        <div class="mb-3">

                            <label class="form-label"
                                   th:text="#{password.old}">
                                Old Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{oldPassword}"
                                   th:placeholder="#{password.old.placeholder}">

                        </div>

                        <div class="mb-3">

                            <label class="form-label"
                                   th:text="#{password.new}">
                                New Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{newPassword}"
                                   th:placeholder="#{password.new.placeholder}">

                        </div>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/dashboard}"
                               class="btn btn-secondary"
                               th:text="#{button.back}">
                                Back
                            </a>

                            <button type="submit"
                                    class="btn btn-info text-white"
                                    th:text="#{button.changePassword}">
                                Change Password
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
