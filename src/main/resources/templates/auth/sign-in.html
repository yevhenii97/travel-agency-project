<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{auth.login}">Login</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0" th:text="#{auth.login}">
                        Login
                    </h3>
                </div>

                <div class="card-body">

                    <div class="mb-3 text-end">
                        <a th:href="@{/auth/sign-in(lang='en')}" class="btn btn-sm btn-outline-secondary">EN</a>
                        <a th:href="@{/auth/sign-in(lang='uk')}" class="btn btn-sm btn-outline-secondary">UA</a>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger">
                        Invalid username or password
                    </div>

                    <div th:if="${param.registered}" class="alert alert-success">
                        Registration successful. Please sign in.
                    </div>

                    <form th:action="@{/auth/login}" method="post">

                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.username}">
                                Username
                            </label>

                            <input type="text"
                                   class="form-control"
                                   name="username"
                                   placeholder="username">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.password}">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   placeholder="password">
                        </div>

                        <div class="d-flex justify-content-between">

                            <a th:href="@{/}" class="btn btn-secondary">
                                Back
                            </a>

                            <button type="submit" class="btn btn-primary">
                                <span th:text="#{auth.login}">Login</span>
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
