<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{app.title}">Travel Agency</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        .hero {
            min-height: 90vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
                url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}" th:text="#{app.title}">
            Travel Agency
        </a>

        <div class="d-flex gap-2">
            <a th:href="@{/(lang='en')}" class="btn btn-sm btn-outline-light">EN</a>
            <a th:href="@{/(lang='uk')}" class="btn btn-sm btn-outline-light">UA</a>

            <a th:href="@{/auth/sign-in}" class="btn btn-outline-success">
                <span th:text="#{auth.login}">Sign in</span>
            </a>

            <a th:href="@{/auth/sign-up}" class="btn btn-warning">
                <span th:text="#{auth.register}">Sign up</span>
            </a>
        </div>
    </div>
</nav>

<section class="hero d-flex align-items-center">
    <div class="container text-center">

        <h1 class="display-3 fw-bold mb-3" th:text="#{app.title}">
            Travel Agency
        </h1>

        <p class="lead mb-4" th:text="#{home.subtitle}"></p>

        <div class="d-flex justify-content-center gap-3">
            <a th:href="@{/auth/sign-in}" class="btn btn-success btn-lg px-4">
                <span th:text="#{auth.login}">Sign in</span>
            </a>

            <a th:href="@{/auth/sign-up}" class="btn btn-outline-light btn-lg px-4">
                <span th:text="#{auth.register}">Sign up</span>
            </a>
        </div>

    </div>
</section>

</body>
</html>
